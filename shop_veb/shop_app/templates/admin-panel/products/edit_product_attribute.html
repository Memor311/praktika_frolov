{% extends 'base.html' %}
{% block title %}Редактировать атрибут | {{ product.name }}{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Редактировать атрибут</h1>
    <a href="{% url 'product-attributes' product.id %}" class="btn btn-secondary">← Назад к атрибутам</a>
  </div>

  <div class="card" style="max-width: 600px;">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
          <label class="form-label">Товар</label>
          <input type="text" class="form-control" value="{{ product.name }}" disabled>
        </div>

        <div class="mb-3">
          <label class="form-label">Атрибут</label>
          <select name="attribute" class="form-select" required>
            <option value="">Выберите...</option>
            {% for attr in all_attributes %}
              <option value="{{ attr.id }}" {% if attr.id == attribute_obj.attribute_id %}selected{% endif %}>
                {{ attr.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Значение</label>
          <input type="text" name="value" class="form-control" value="{{ attribute_obj.value }}" required>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="{% url 'product-attributes' product.id %}" class="btn btn-outline-secondary ms-2">Отмена</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
